<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Weeknd: Interactive Narrative Experience</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="homepage">
    <nav class="top-links">
      <a href="about-credits.html" class="nav-link left-link">About / Credits</a>

      <div class="xo-logo-wrap">
        <img src="images/weeknd/XO.png" alt="XO logo" class="xo-logo" />
      </div>
    </nav>

    <header class="hero-text">
      <p class="eyebrow">Interactive Narrative Experience</p>
      <h1>The Weeknd</h1>
      <p class="subtitle">
        Explore 10 album eras through immersive visuals, atmosphere, and interaction.
      </p>
    </header>

    <section class="hub" id="albums" aria-label="Album navigation hub">
      <div class="top-albums">
        <a href="album-home/house-of-balloons.html" class="album album-card" data-color="#d9d9d9">
          <img src="images/albums/house-of-balloons.png" alt="House of Balloons album cover" />
          <span class="album-label">House of Balloons</span>
        </a>

        <a href="album-home/thursday.html" class="album album-card" data-color="#8d95a6">
          <img src="images/albums/thursday.png" alt="Thursday album cover" />
          <span class="album-label">Thursday</span>
        </a>

        <a href="album-home/echoes-of-silence.html" class="album album-card" data-color="#7f8b95">
          <img src="images/albums/echoes-of-silence.png" alt="Echoes of Silence album cover" />
          <span class="album-label">Echoes of Silence</span>
        </a>

        <a href="album-home/kiss-land.html" class="album album-card" data-color="#00ff66">
          <img src="images/albums/kiss-land.png" alt="Kiss Land album cover" />
          <span class="album-label">Kiss Land</span>
        </a>
      </div>

      <div class="main-layout">
        <div class="side-column left-column">
          <a href="album-home/beauty-behind-the-madness.html" class="album album-card" data-color="#cfcfcf">
            <img src="images/albums/beauty-behind-the-madness.png" alt="Beauty Behind the Madness album cover" />
            <span class="album-label">Beauty Behind the Madness</span>
          </a>

          <a href="album-home/starboy.html" class="album album-card" data-color="#ff0033">
            <img src="images/albums/starboy.png" alt="Starboy album cover" />
            <span class="album-label">Starboy</span>
          </a>

          <a href="album-home/my-dear-melancholy.html" class="album album-card" data-color="#8b0000">
            <img src="images/albums/my-dear-melancholy.jpg" alt="My Dear Melancholy album cover" />
            <span class="album-label">My Dear Melancholy</span>
          </a>
        </div>

        <div class="centerpiece">
          <img src="images/weeknd/abel.png" alt="Portrait of The Weeknd" />
        </div>

        <div class="side-column right-column">
          <a href="album-home/after-hours.html" class="album album-card" data-color="#ff2a2a">
            <img src="images/albums/after-hours.png" alt="After Hours album cover" />
            <span class="album-label">After Hours</span>
          </a>

          <a href="album-home/dawn-fm.html" class="album album-card" data-color="#4b6cff">
            <img src="images/albums/dawn-fm.png" alt="Dawn FM album cover" />
            <span class="album-label">Dawn FM</span>
          </a>

          <a href="album-home/hurry-up-tomorrow.html" class="album album-card" data-color="#8fa7c7">
            <img src="images/albums/hurry-up-tomorrow.png" alt="Hurry Up Tomorrow album cover" />
            <span class="album-label">Hurry Up Tomorrow</span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
